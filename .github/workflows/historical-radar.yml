name: Build and deploy a historical radar loop

on:
  workflow_dispatch:
    inputs:
      date_mode:
        description: Eastern Time archive date
        required: true
        default: today
        type: choice
        options:
          - today
          - yesterday
          - 2-days-ago
          - 3-days-ago
          - 7-days-ago
          - custom
      end_mode:
        description: Eastern Time end of the loop
        required: true
        default: now
        type: choice
        options:
          - now
          - 30-minutes-ago
          - 1-hour-ago
          - 2-hours-ago
          - 3-hours-ago
          - 6-hours-ago
          - custom
      duration_minutes:
        description: Loop duration in minutes
        required: true
        default: '90'
        type: choice
        options:
          - '30'
          - '60'
          - '90'
          - '120'
          - '180'
          - '360'
          - '720'
          - '1440'
      custom_date:
        description: Only used when date is custom (YYYY-MM-DD)
        required: false
        type: string
      custom_end_time:
        description: Only used when end is custom (HH:MM ET or H:MM AM/PM)
        required: false
        type: string
      label:
        description: Optional viewer label
        required: false
        type: string
      max_frames:
        description: Maximum evenly sampled frames
        required: true
        default: '45'
        type: string
      precipitation_type:
        description: Also build precipitation-type frames
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-history-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore previously generated historical packs
        uses: actions/cache/restore@v4
        with:
          path: |
            public/data/radar/history
            public/data/radar/krax/history
          key: radar-history-${{ runner.os }}-restore-${{ github.run_id }}
          restore-keys: |
            radar-history-${{ runner.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install radar processor dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build current live radar
        env:
          MRMS_MAX_FRAMES: '30'
          MRMS_RETENTION_MINUTES: '90'
          MRMS_INCLUDE_PRECIP_TYPE: 'true'
        run: python scripts/build_radar_frames.py

      - name: Build requested historical loop
        shell: bash
        env:
          HISTORY_DATE_MODE: ${{ inputs.date_mode }}
          HISTORY_END_MODE: ${{ inputs.end_mode }}
          HISTORY_DURATION_MINUTES: ${{ inputs.duration_minutes }}
          HISTORY_CUSTOM_DATE: ${{ inputs.custom_date }}
          HISTORY_CUSTOM_END_TIME: ${{ inputs.custom_end_time }}
        run: |
          resolve_args=(--date-mode "$HISTORY_DATE_MODE" --end-mode "$HISTORY_END_MODE" --duration-minutes "$HISTORY_DURATION_MINUTES")
          if [[ -n "$HISTORY_CUSTOM_DATE" ]]; then resolve_args+=(--custom-date "$HISTORY_CUSTOM_DATE"); fi
          if [[ -n "$HISTORY_CUSTOM_END_TIME" ]]; then resolve_args+=(--custom-end-time "$HISTORY_CUSTOM_END_TIME"); fi
          python scripts/resolve_history_window.py "${resolve_args[@]}" > window.env
          cat window.env
          start_et="$(sed -n 's/^start_et=//p' window.env)"
          end_et="$(sed -n 's/^end_et=//p' window.env)"
          test -n "$start_et" && test -n "$end_et"
          echo "start=$start_et" >> "$GITHUB_OUTPUT"
          echo "end=$end_et" >> "$GITHUB_OUTPUT"
        id: resolve_window

      - name: Build requested historical loop
        shell: bash
        env:
          HISTORY_START: ${{ steps.resolve_window.outputs.start }}
          HISTORY_END: ${{ steps.resolve_window.outputs.end }}
          HISTORY_LABEL: ${{ inputs.label }}
          HISTORY_MAX_FRAMES: ${{ inputs.max_frames }}
          HISTORY_PRECIPITATION_TYPE: ${{ inputs.precipitation_type }}
        run: |
          args=(--start "$HISTORY_START" --end "$HISTORY_END" --max-frames "$HISTORY_MAX_FRAMES")
          if [[ -n "$HISTORY_LABEL" ]]; then args+=(--label "$HISTORY_LABEL"); fi
          if [[ "$HISTORY_PRECIPITATION_TYPE" != "true" ]]; then args+=(--no-precip-type); fi
          python scripts/build_historical_radar.py "${args[@]}"

      - name: Save historical packs for future live refreshes
        uses: actions/cache/save@v4
        with:
          path: |
            public/data/radar/history
            public/data/radar/krax/history
          key: radar-history-${{ runner.os }}-${{ github.run_id }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Build static site
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
