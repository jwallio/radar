name: Deploy application to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Restore generated historical packs
        uses: actions/cache/restore@v4
        with:
          path: public/data/radar/history
          key: radar-history-${{ runner.os }}-restore-${{ github.run_id }}
          restore-keys: |
            radar-history-${{ runner.os }}-
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build application
        env:
          VITE_BASE_PATH: /
        run: npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
